/* Header */
header{
    background:#111;
    color:white;
    padding:20px;
    text-align:center;
    font-size:28px;
}

nav{
    background:#222;
    padding:10px;

nav a{
    color:white;
    text-decoration:none;
    margin:10px;

}

/* Main container */
.container{
    text-align:center;
    margin-top:80px;
}

/* Card style */
.card{
    background:white;
    width:320px;
    margin:auto;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 10px 25px rgba(0,0,0,0.3);
}

/* Button */
button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#28a745;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1e7e34;
}
